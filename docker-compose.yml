version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: laundry_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: laundry_system
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laundry_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/laundry_system
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      JWT_EXPIRES_IN: 7d
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      CORS_ORIGIN: '*'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laundry_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
